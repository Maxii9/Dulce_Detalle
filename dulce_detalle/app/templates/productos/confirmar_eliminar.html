{% extends "base.html" %}

{% block title %}Eliminar producto{% endblock %}

{% block content %}

<div class="max-w-lg mx-auto">
  <div class="bg-gray-900 rounded-2xl border border-red-900/50 shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="px-8 py-6 border-b border-gray-800 bg-gradient-to-r from-red-900/20 to-transparent">
      <h1 class="text-2xl font-bold text-white flex items-center gap-3">
        <span class="text-2xl">🗑️</span> Eliminar producto
      </h1>
    </div>

    <!-- Body -->
    <div class="px-8 py-8 text-center">
      <div class="w-16 h-16 bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <p class="text-gray-300 text-lg mb-2">¿Estás seguro de que querés eliminar</p>
      <p class="text-white text-xl font-bold mb-1">"{{ producto.nombre }}"</p>
      <p class="text-gray-500 text-sm">Esta acción no se puede deshacer.</p>
    </div>

    <!-- Acciones -->
    <div class="px-8 pb-8 flex gap-3">
      <form method="post" class="flex-1">
        {% csrf_token %}
        <button type="submit"
                class="w-full py-3 bg-red-600 hover:bg-red-500 text-white font-semibold
                       rounded-xl transition-all shadow-lg shadow-red-900/40">
          Sí, eliminar
        </button>
      </form>
      <a href="{% url 'lista_productos' %}"
         class="flex-1 py-3 bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold
                rounded-xl transition-all text-center">
        Cancelar
      </a>
    </div>
  </div>
</div>

{% endblock %}
