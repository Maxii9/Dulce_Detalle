<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — Mi Tienda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-16px); }
    }
    .float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-white to-purple-50 min-h-screen flex items-center justify-center p-6">

  <div class="text-center max-w-lg w-full">

    <!-- Número de error flotante -->
    <div class="float mb-6 select-none">
      <span class="text-[120px] md:text-[160px] font-extrabold leading-none bg-gradient-to-br from-pink-400 to-purple-500 bg-clip-text text-transparent drop-shadow-sm">
        404
      </span>
    </div>

    <!-- Ícono -->
    <div class="mb-6">
      <span class="text-5xl">🛍️</span>
    </div>

    <!-- Mensaje -->
    <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-3">
      ¡Esta página no existe!
    </h1>
    <p class="text-gray-500 text-base mb-8 leading-relaxed">
      La página que estás buscando fue movida, eliminada<br class="hidden sm:block"/>
      o quizás nunca existió.
    </p>

    <!-- Botones -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="/"
         class="w-full sm:w-auto px-6 py-3 bg-gradient-to-r from-pink-500 to-purple-500 text-white font-semibold rounded-xl shadow-md hover:shadow-lg hover:opacity-90 transition-all text-sm">
        🏠 Volver al inicio
      </a>
      <button onclick="history.back()"
         class="w-full sm:w-auto px-6 py-3 bg-white text-gray-700 font-semibold rounded-xl border border-gray-200 shadow-sm hover:bg-gray-50 transition-all text-sm">
        ← Página anterior
      </button>
    </div>

  </div>

</body>
</html>
