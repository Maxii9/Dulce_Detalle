{% extends 'base.html' %}
{% block title %}Recuperar Contraseña{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
  <div class="text-center mb-8">
    <span class="text-4xl">🔑</span>
    <h1 class="text-2xl font-bold text-gray-900 mt-4">¿Olvidaste tu contraseña?</h1>
    <p class="text-gray-500 text-sm mt-1">Ingresá tu email y te enviamos un link para restablecerla.</p>
  </div>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Correo electrónico</label>
      <input type="email" name="email" required placeholder="tu@email.com"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-transparent transition-all">
    </div>
    <button type="submit"
      class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-4 rounded-xl transition-all shadow mt-2">
      Enviar link de recuperación
    </button>
  </form>
  <p class="text-center text-sm text-gray-500 mt-6">
    ¿Recordaste tu contraseña?
    <a href="{% url 'login' %}" class="text-pink-600 font-bold hover:underline">Iniciar sesión</a>
  </p>
</div>
{% endblock %}
