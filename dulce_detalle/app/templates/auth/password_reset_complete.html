{% extends 'base.html' %}
{% block title %}Contraseña restablecida{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white p-8 rounded-2xl shadow-xl border border-gray-100 text-center">
  <span class="text-5xl">✅</span>
  <h1 class="text-2xl font-bold text-gray-900 mt-4">¡Contraseña actualizada!</h1>
  <p class="text-gray-500 text-sm mt-3">
    Tu contraseña fue cambiada exitosamente. Ya podés iniciar sesión con tu nueva contraseña.
  </p>
  <a href="{% url 'login' %}"
    class="inline-block mt-6 bg-pink-500 hover:bg-pink-600 text-white font-bold py-2.5 px-6 rounded-xl transition-all shadow text-sm">
    Iniciar sesión
  </a>
</div>
{% endblock %}
