<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error del servidor — Mi Tienda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .pulse-slow { animation: pulse-slow 2.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-rose-50 via-white to-orange-50 min-h-screen flex items-center justify-center p-6">

  <div class="text-center max-w-lg w-full">

    <!-- Número de error -->
    <div class="mb-6 select-none">
      <span class="text-[120px] md:text-[160px] font-extrabold leading-none bg-gradient-to-br from-rose-400 to-orange-400 bg-clip-text text-transparent drop-shadow-sm">
        500
      </span>
    </div>

    <!-- Ícono animado -->
    <div class="mb-6 pulse-slow">
      <span class="text-5xl">⚙️</span>
    </div>

    <!-- Mensaje -->
    <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-3">
      Algo salió mal
    </h1>
    <p class="text-gray-500 text-base mb-2 leading-relaxed">
      Nuestro servidor encontró un error inesperado.<br class="hidden sm:block"/>
      Ya estamos trabajando para resolverlo.
    </p>
    <p class="text-gray-400 text-sm mb-8">
      Por favor, intentá de nuevo en unos minutos.
    </p>

    <!-- Botones -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="/"
         class="w-full sm:w-auto px-6 py-3 bg-gradient-to-r from-rose-500 to-orange-400 text-white font-semibold rounded-xl shadow-md hover:shadow-lg hover:opacity-90 transition-all text-sm">
        🏠 Volver al inicio
      </a>
      <button onclick="location.reload()"
         class="w-full sm:w-auto px-6 py-3 bg-white text-gray-700 font-semibold rounded-xl border border-gray-200 shadow-sm hover:bg-gray-50 transition-all text-sm">
        🔄 Reintentar
      </button>
    </div>

  </div>

</body>
</html>
